<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Contact Form Test</title>
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .form-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 20px auto;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #000000;
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #cccccc;
            border-radius: 5px;
            background: #ffffff;
            color: #000000;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            background: #c9a96e;
            color: #000000;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        button:hover {
            background: #b8945d;
        }
        
        h2 {
            color: #000000;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">SIMPLE FORM TEST</h1>
    
    <div class="form-container">
        <h2>Contact Form</h2>
        <form>
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="package">Select Package *</label>
                <select id="package" name="package" required>
                    <option value="">Choose a package</option>
                    <option value="Chardham 05N/06D">Chardham 05N/06D</option>
                    <option value="Char Dham 02N/03D">Char Dham : 02 N/03 D</option>
                    <option value="Do Dham Same Day">Do Dham (Same Day)</option>
                    <option value="Do Dham 3N/4D">Do Dham Yatra (3N/4D)</option>
                    <option value="Adi Kailash">Adi Kailash</option>
                    <option value="General Inquiry">General Inquiry</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Tell us about your requirements..."></textarea>
            </div>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
